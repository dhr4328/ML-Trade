name: NIFTY model prediction

on:
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 🔧 FIX: Install dependencies safely
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          
          # Install base dependencies
          pip install -r requirements.txt
          
          # 🔥 Fix pandas_ta issue (force install from GitHub)
          pip install git+https://github.com/twopirllc/pandas-ta.git

      - name: Run prediction (NIFTY)
        env:
          SYMBOL: "^NSEI"
          PERIOD: "5d"
          INTERVAL: "5m"
          MODEL_PATH: "xgb_model.pkl"
          BUY_THRESHOLD: "0.70"
          SELL_THRESHOLD: "0.70"
          OUT_FILE: "prediction.json"
          LOOP_MODE: "1"
          TZ_NAME: "Asia/Kolkata"
          MARKET_CLOSE_HHMM: "15:30"
          SLEEP_SECONDS: "300"
          LOG_NDJSON: "predictions.ndjson"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/nifty_predict.py

      - name: Upload prediction artifact
        uses: actions/upload-artifact@v4
        with:
          name: prediction
          path: |
            prediction.json
            predictions.ndjson