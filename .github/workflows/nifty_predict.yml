name: NIFTY model prediction

on:
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    # Note: GitHub-hosted runners have a max job runtime (commonly 360 minutes).
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # TA-Lib needs the native library on Linux
      - name: Install TA-Lib system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y ta-lib || sudo apt-get install -y libta-lib0 libta-lib0-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run prediction (NIFTY)
        env:
          SYMBOL: "^NSEI"
          PERIOD: "5d"
          INTERVAL: "5m"
          MODEL_PATH: "xgb_model.pkl"
          BUY_THRESHOLD: "0.70"
          SELL_THRESHOLD: "0.70"
          OUT_FILE: "prediction.json"
          LOOP_MODE: "1"
          TZ_NAME: "Asia/Kolkata"
          MARKET_CLOSE_HHMM: "15:30"
          SLEEP_SECONDS: "300"
          LOG_NDJSON: "predictions.ndjson"
        run: |
          python scripts/nifty_predict.py

      - name: Upload prediction artifact
        uses: actions/upload-artifact@v4
        with:
          name: prediction
          path: |
            prediction.json
            predictions.ndjson
